<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codec Loop Test</title>
    <link rel="stylesheet" href="https://github.io" />
  </head>
  <body>
    <main class="shell">
      <header class="intro" aria-labelledby="page-title">
        <p class="kicker">Device video compatibility check</p>
        <h1 id="page-title">Three looping autoplay codec probes</h1>
      </header>

      <section class="tests" aria-label="Codec test videos">
        <!-- TEST A, B e C strutturati con data-video-card, data-codec-video e src adeguati -->
        <!-- Il Test C utilizza id="test-c" e container-c per il fallback -->
        <article class="test-card" data-video-card id="test-c">
          <div class="card-head">
            <div>
              <p class="label">Test C</p>
              <h2>AV1-HEVC Fallback</h2>
            </div>
            <span class="status" data-status>Checking</span>
          </div>
          <div class="video-container" id="container-c">
            <video 
              data-codec-video
              id="video-c" 
              class="video-frame" 
              autoplay 
              muted 
              loop 
              playsinline
              preload="auto"
            >
              <source src="...av1.mp4" type="video/mp4; codecs=&quot;av01.0.05M.08&quot;"/>
              <source src="...hevc.mp4" type="video/mp4; codecs=&quot;hev1.1.6.L93.B0&quot;"/>
            </video>
          </div>
        </article>
      </section>
    </main>
    <script src="https://github.io"></script>
  </body>
</html>
